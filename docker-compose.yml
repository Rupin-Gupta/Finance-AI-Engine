services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - faiss_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - faiss_data:/app/data
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2'

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'

volumes:
  pgdata:
  faiss_data:
  huggingface_cache:
